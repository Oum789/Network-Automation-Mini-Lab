---
all:
  children:

    access_switches:
      hosts:
        AS-HQ1: { ansible_host: 10.10.99.11,  site: hq }
        AS-HQ2: { ansible_host: 10.10.99.12,  site: hq }
        AS-BR1: { ansible_host: 10.20.199.11, site: br }
        AS-BR2: { ansible_host: 10.20.199.12, site: br }

    dist_switches:
      hosts:
        DS-HQ1: { ansible_host: 10.10.99.2,  site: hq }
        DS-HQ2: { ansible_host: 10.10.99.3,  site: hq }
        # BR is the remote site: at cold bootstrap the mgmt subnet (VLAN 199) is
        # NOT routable yet — nothing advertises 10.20.199.0/24 until DS OSPF is up.
        # The transit /29 (VLAN 200) IS reachable (FW-BR advertises it into OSPF and
        # is directly connected), so manage the BR dist switches on their transit SVI.
        # Kept permanently so a cold rebuild always works. AS-BR has no L3 in VLAN 200,
        # so it stays on VLAN 199 and becomes reachable once dist.yml brings up the
        # VLAN 199 HSRP VIP + OSPF (site.yml runs dist before access).
        DS-BR1: { ansible_host: 10.20.200.2, site: br }
        DS-BR2: { ansible_host: 10.20.200.3, site: br }

    isp_routers:
      hosts:
        ISP-A-HQ: { ansible_host: 10.255.1.1 }
        ISP-B-HQ: { ansible_host: 10.255.1.2 }
        ISP-A-BR: { ansible_host: 10.255.1.11 }
        ISP-B-BR: { ansible_host: 10.255.1.12 }
        Internet: { ansible_host: 10.255.1.99 }

    # L2 WAN switches between FW WAN ports and ISP routers.
    # No in-band mgmt IP at day-0 (WAN /30 has no spare host address),
    # so these are console-only until a mgmt VLAN is added. Configured
    # fully at bootstrap; not targeted by Ansible.
    wan_switches:
      hosts:
        ISP-A-SW-HQ: {}
        ISP-B-SW-HQ: {}
        ISP-A-SW-BR: {}
        ISP-B-SW-BR: {}

    fortigates:
      # Managed via the inside-sw transit IP, NOT the loopback. allowaccess on a
      # loopback doesn't permit remote mgmt (FortiGate checks allowaccess on the
      # ingress interface, which only covers its own IP). inside-sw's IP passes
      # because it IS the ingress interface's own IP. Both are HA-floating.
      hosts:
        FW-HQ: { ansible_host: 10.10.100.1, site: hq }
        FW-BR: { ansible_host: 10.20.200.1, site: br }

    ios_devices:
      children:
        access_switches:
        dist_switches:
        isp_routers:

    hq:
      hosts:
        AS-HQ1:
        AS-HQ2:
        DS-HQ1:
        DS-HQ2:
        FW-HQ:

    br:
      hosts:
        AS-BR1:
        AS-BR2:
        DS-BR1:
        DS-BR2:
        FW-BR:
