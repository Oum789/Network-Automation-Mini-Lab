---
- name: Common — hostname + domain
  cisco.ios.ios_config:
    lines:
      - "hostname {{ inventory_hostname }}"
      - "ip domain name {{ domain_name }}"
      - "no ip domain-lookup"

- name: Common — NTP
  cisco.ios.ios_config:
    lines: "{{ ntp_servers | map('regex_replace', '^(.*)$', 'ntp server \\1') | list }}"

- name: Common — DNS
  cisco.ios.ios_config:
    lines: "{{ dns_servers | map('regex_replace', '^(.*)$', 'ip name-server \\1') | list }}"

- name: Common — login banner
  cisco.ios.ios_config:
    lines:
      - "banner motd ^ Authorized access only. Activity is logged. ^"

- name: Common — service hardening
  cisco.ios.ios_config:
    lines:
      - "service password-encryption"
      - "no ip http server"
      - "no ip http secure-server"
      - "logging buffered 64000"

- name: Common — save
  cisco.ios.ios_config:
    save_when: modified
